<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Finder - Lightning Fast Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #161b33;
            --bg-tertiary: #1e2640;
            --text-primary: #e4e7f5;
            --text-secondary: #9ca3c0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2d3350;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Left Panel - Note List */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-box {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .note-item {
            padding: 16px;
            margin-bottom: 4px;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item:hover {
            background: var(--bg-primary);
            border-color: var(--border);
        }

        .note-item.active {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        .note-date {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .note-preview {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-match {
            background: rgba(99, 102, 241, 0.3);
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* Right Panel - Note Content */
        .content {
            background: var(--bg-primary);
            overflow-y: auto;
            padding: 48px;
        }

        .content-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            color: var(--text-secondary);
        }

        .content-empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .note-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .note-content-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .note-content-date {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .note-content-filename {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .note-content-body {
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--text-primary);
        }

        .navigation-hint {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
        }

        .kbd {
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 11px;
            border: 1px solid var(--border);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* Highlight search terms in content */
        .highlight {
            background: rgba(99, 102, 241, 0.3);
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="app" class="loading">Loading notes...</div>

    <script>
        let allNotes = [];
        let filteredNotes = [];
        let currentIndex = -1;

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load notes from server
        async function loadNotes() {
            try {
                const response = await fetch('/api/notes');
                allNotes = await response.json();
                filteredNotes = [...allNotes];
                renderApp();
            } catch (error) {
                console.error('Error loading notes:', error);
                document.getElementById('app').textContent = 'Failed to load notes';
            }
        }

        // Render the application using DOM methods
        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = ''; // Clear loading

            const container = document.createElement('div');
            container.className = 'container';

            // Create sidebar
            const sidebar = document.createElement('div');
            sidebar.className = 'sidebar';

            const header = document.createElement('div');
            header.className = 'header';
            const h1 = document.createElement('h1');
            h1.textContent = '⚡ Note Finder';
            const stats = document.createElement('div');
            stats.className = 'stats';
            stats.id = 'stats';
            stats.textContent = `${allNotes.length} notes`;
            header.appendChild(h1);
            header.appendChild(stats);

            const searchBox = document.createElement('div');
            searchBox.className = 'search-box';
            const searchInput = document.createElement('input');
            searchInput.type = 'text';
            searchInput.className = 'search-input';
            searchInput.id = 'search';
            searchInput.placeholder = 'Search your notes...';
            searchInput.autocomplete = 'off';
            searchBox.appendChild(searchInput);

            const notesList = document.createElement('div');
            notesList.className = 'notes-list';
            notesList.id = 'notesList';

            sidebar.appendChild(header);
            sidebar.appendChild(searchBox);
            sidebar.appendChild(notesList);

            // Create content area
            const content = document.createElement('div');
            content.className = 'content';
            content.id = 'content';

            const emptyState = document.createElement('div');
            emptyState.className = 'content-empty';
            const emptyIcon = document.createElement('div');
            emptyIcon.className = 'content-empty-icon';
            emptyIcon.textContent = '📝';
            const emptyText = document.createElement('div');
            emptyText.textContent = 'Select a note to read';
            emptyState.appendChild(emptyIcon);
            emptyState.appendChild(emptyText);
            content.appendChild(emptyState);

            // Create navigation hint
            const navHint = document.createElement('div');
            navHint.className = 'navigation-hint';
            navHint.innerHTML = `
                <span><span class="kbd">↑</span> <span class="kbd">↓</span> Navigate</span>
                <span><span class="kbd">Enter</span> Open</span>
                <span><span class="kbd">/</span> Search</span>
            `;

            container.appendChild(sidebar);
            container.appendChild(content);
            app.appendChild(container);
            app.appendChild(navHint);

            renderNotesList();
            attachEventListeners();
        }

        // Render the notes list using DOM methods
        function renderNotesList() {
            const notesList = document.getElementById('notesList');
            const stats = document.getElementById('stats');
            notesList.innerHTML = ''; // Clear existing

            if (filteredNotes.length === 0) {
                const empty = document.createElement('div');
                empty.style.padding = '24px';
                empty.style.textAlign = 'center';
                empty.style.color = 'var(--text-secondary)';
                empty.textContent = 'No notes found';
                notesList.appendChild(empty);
                stats.textContent = '0 notes';
                return;
            }

            stats.textContent = `${filteredNotes.length} of ${allNotes.length} notes`;

            filteredNotes.forEach((note, index) => {
                const item = document.createElement('div');
                item.className = `note-item ${index === currentIndex ? 'active' : ''}`;
                item.dataset.index = index;

                const date = document.createElement('div');
                date.className = 'note-date';
                date.textContent = note.dateDisplay;

                const preview = document.createElement('div');
                preview.className = 'note-preview';
                preview.textContent = getPreview(note);

                item.appendChild(date);
                item.appendChild(preview);
                notesList.appendChild(item);
            });

            // Scroll active item into view
            if (currentIndex >= 0) {
                const activeItem = notesList.querySelector('.note-item.active');
                if (activeItem) {
                    activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }
        }

        // Get preview text from note
        function getPreview(note) {
            const lines = note.content.split('\n');
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed && !trimmed.startsWith('[') && !trimmed.includes('===')) {
                    return trimmed.substring(0, 80);
                }
            }
            return 'No preview available';
        }

        // Highlight search term in text (safe version using DOM)
        function createHighlightedContent(text, searchTerm) {
            const container = document.createElement('div');

            if (!searchTerm) {
                container.textContent = text;
                return container;
            }

            const parts = text.split(new RegExp(`(${searchTerm})`, 'gi'));
            parts.forEach(part => {
                if (part.toLowerCase() === searchTerm.toLowerCase()) {
                    const span = document.createElement('span');
                    span.className = 'highlight';
                    span.textContent = part;
                    container.appendChild(span);
                } else {
                    container.appendChild(document.createTextNode(part));
                }
            });

            return container;
        }

        // Search notes
        function searchNotes(query) {
            if (!query.trim()) {
                filteredNotes = [...allNotes];
            } else {
                const lowerQuery = query.toLowerCase();
                filteredNotes = allNotes.filter(note =>
                    note.content.toLowerCase().includes(lowerQuery) ||
                    note.dateDisplay.toLowerCase().includes(lowerQuery) ||
                    note.filename.toLowerCase().includes(lowerQuery)
                );
            }
            currentIndex = filteredNotes.length > 0 ? 0 : -1;
            renderNotesList();
            if (currentIndex >= 0) {
                displayNote(currentIndex);
            } else {
                showEmptyState();
            }
        }

        // Display a note using safe DOM methods
        function displayNote(index) {
            if (index < 0 || index >= filteredNotes.length) return;

            currentIndex = index;
            const note = filteredNotes[index];
            const content = document.getElementById('content');
            const searchTerm = document.getElementById('search').value;

            content.innerHTML = ''; // Clear

            const noteContent = document.createElement('div');
            noteContent.className = 'note-content';

            const header = document.createElement('div');
            header.className = 'note-content-header';

            const dateDisplay = document.createElement('div');
            dateDisplay.className = 'note-content-date';
            dateDisplay.textContent = note.dateDisplay;

            const filename = document.createElement('div');
            filename.className = 'note-content-filename';
            filename.textContent = note.filename;

            header.appendChild(dateDisplay);
            header.appendChild(filename);

            const body = document.createElement('div');
            body.className = 'note-content-body';

            // Use safe highlighting
            const highlightedContent = createHighlightedContent(note.content, searchTerm);
            body.appendChild(highlightedContent);

            noteContent.appendChild(header);
            noteContent.appendChild(body);
            content.appendChild(noteContent);

            renderNotesList();
        }

        // Show empty state
        function showEmptyState() {
            const content = document.getElementById('content');
            content.innerHTML = '';

            const emptyState = document.createElement('div');
            emptyState.className = 'content-empty';

            const icon = document.createElement('div');
            icon.className = 'content-empty-icon';
            icon.textContent = '📝';

            const text = document.createElement('div');
            text.textContent = 'No notes to display';

            emptyState.appendChild(icon);
            emptyState.appendChild(text);
            content.appendChild(emptyState);
        }

        // Attach event listeners
        function attachEventListeners() {
            const search = document.getElementById('search');
            const notesList = document.getElementById('notesList');

            // Search input
            search.addEventListener('input', (e) => {
                searchNotes(e.target.value);
            });

            // Click on note
            notesList.addEventListener('click', (e) => {
                const item = e.target.closest('.note-item');
                if (item) {
                    const index = parseInt(item.dataset.index);
                    displayNote(index);
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                // Focus search on '/'
                if (e.key === '/' && document.activeElement !== search) {
                    e.preventDefault();
                    search.focus();
                    return;
                }

                // Navigate with arrow keys
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentIndex > 0) {
                        displayNote(currentIndex - 1);
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (currentIndex < filteredNotes.length - 1) {
                        displayNote(currentIndex + 1);
                    }
                } else if (e.key === 'Enter' && document.activeElement !== search) {
                    if (currentIndex >= 0) {
                        displayNote(currentIndex);
                    }
                } else if (e.key === 'Escape') {
                    search.blur();
                }
            });

            // Focus search on load
            search.focus();
        }

        // Initialize app
        loadNotes();
    </script>
</body>
</html>
