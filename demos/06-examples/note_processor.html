<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Processor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* === Brand Color System === */
        :root {
            /* Primary */
            --ink-black: #000000;
            --warm-cream: #F5F3EB;

            /* Accents */
            --coral: #E86B5A;
            --golden: #F5C542;
            --sage: #7CB56B;
            --sky: #5B9BD5;

            /* Tints */
            --coral-light: #FBEAE7;
            --golden-light: #FEF8E6;
            --sage-light: #EEF5EC;
            --sky-light: #E8F1F9;

            /* Grays */
            --gray-100: #F5F4F1;
            --gray-300: #DDD9D2;
            --gray-500: #8A847A;
            --gray-600: #5C5750;
            --gray-800: #2A2825;

            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--warm-cream);
            min-height: 100vh;
            padding: var(--space-xl);
            color: var(--gray-800);
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border: 2px solid var(--ink-black);
            border-radius: 0;
        }

        .header {
            background: var(--ink-black);
            color: #ffffff;
            padding: var(--space-xl) var(--space-lg);
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--space-sm);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1rem;
            font-weight: 300;
            color: var(--gray-300);
        }

        .content {
            padding: var(--space-lg);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--gray-300);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .section-title h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--ink-black);
        }

        .counter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--sky);
            color: #ffffff;
            padding: var(--space-xs) var(--space-sm);
            min-width: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: var(--space-sm);
        }

        .btn {
            padding: var(--space-sm) var(--space-md);
            border: 2px solid var(--ink-black);
            border-radius: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: var(--ink-black);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--gray-800);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ffffff;
            color: var(--coral);
            border-color: var(--coral);
        }

        .btn-danger:hover {
            background: var(--coral);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .item {
            background: #ffffff;
            border: 2px solid var(--gray-300);
            padding: var(--space-md) var(--space-lg);
            transition: all 0.2s ease;
        }

        .item:hover {
            border-color: var(--ink-black);
            transform: translateY(-4px);
            box-shadow: 4px 4px 0 var(--ink-black);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-md);
        }

        .item-text {
            font-size: 1rem;
            color: var(--gray-800);
            flex: 1;
            font-weight: 400;
            line-height: 1.6;
            word-break: break-word;
        }

        .item-actions {
            display: flex;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .btn-small {
            padding: var(--space-xs) var(--space-sm);
            font-size: 0.75rem;
        }

        .btn-view {
            background: var(--sky-light);
            color: var(--sky);
            border-color: var(--sky);
        }

        .btn-view:hover {
            background: var(--sky);
            color: #ffffff;
        }

        .no-items {
            text-align: center;
            padding: var(--space-xl) var(--space-lg);
            color: var(--gray-500);
        }

        .no-items svg {
            width: 80px;
            height: 80px;
            opacity: 0.3;
            margin-bottom: var(--space-md);
            stroke: var(--gray-500);
        }

        .no-items p {
            font-size: 1.1rem;
            font-weight: 400;
        }

        .loading {
            text-align: center;
            padding: var(--space-xl);
            font-size: 1rem;
            color: var(--gray-600);
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: var(--space-lg);
            right: var(--space-lg);
            background: #ffffff;
            padding: var(--space-md) var(--space-lg);
            border: 2px solid var(--ink-black);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.95rem;
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid var(--sage);
            background: var(--sage-light);
        }

        .toast.error {
            border-left: 4px solid var(--coral);
            background: var(--coral-light);
        }

        /* Footer hint */
        .footer-hint {
            text-align: center;
            padding: var(--space-md);
            border-top: 1px solid var(--gray-300);
            background: var(--gray-100);
        }

        .footer-hint code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--golden-light);
            padding: 2px 6px;
            font-size: 0.85rem;
            color: var(--gray-800);
        }

        .footer-hint p {
            font-size: 0.85rem;
            color: var(--gray-600);
        }

        /* Accent stripe */
        .accent-stripe {
            height: 4px;
            display: flex;
        }
        .accent-stripe span {
            flex: 1;
        }
        .accent-stripe .coral { background: var(--coral); }
        .accent-stripe .golden { background: var(--golden); }
        .accent-stripe .sage { background: var(--sage); }
        .accent-stripe .sky { background: var(--sky); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Note Processor</h1>
            <p>Process your @read tagged notes</p>
        </div>
        <div class="accent-stripe">
            <span class="coral"></span>
            <span class="golden"></span>
            <span class="sage"></span>
            <span class="sky"></span>
        </div>

        <div class="content">
            <div class="section-header">
                <div class="section-title">
                    <h2>Reading List</h2>
                    <span class="counter" id="read-count">0</span>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" onclick="loadItems('read')">Refresh</button>
                    <button class="btn btn-danger" onclick="deleteAll('read')">Delete All</button>
                </div>
            </div>
            <div id="read-items" class="item-list"></div>
        </div>

        <div class="footer-hint">
            <p>Remember to stop the server when done: <code>kill the process on port 5001</code></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        let itemsData = {
            read: []
        };

        // Initialize on load
        window.onload = function() {
            loadItems('read');
        };

        async function loadItems(tag) {
            const container = document.getElementById(`${tag}-items`);
            container.innerHTML = '<div class="loading">Loading</div>';

            try {
                const response = await fetch(`${API_URL}/items/${tag}`);
                const data = await response.json();

                if (data.success) {
                    itemsData[tag] = data.items;
                    document.getElementById(`${tag}-count`).textContent = data.count;
                    renderItems(tag, data.items);
                } else {
                    showToast('Error loading items: ' + data.error, 'error');
                    container.innerHTML = '<div class="no-items"><p>Error loading items</p></div>';
                }
            } catch (error) {
                showToast('Failed to connect to API: ' + error.message, 'error');
                container.innerHTML = '<div class="no-items"><p>Failed to connect to API</p></div>';
            }
        }

        function renderItems(tag, items) {
            const container = document.getElementById(`${tag}-items`);

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="no-items">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                        </svg>
                        <p>No @${tag} items found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map((item, index) => {
                const url = extractUrl(item.text);
                const isUrlItem = url;

                return `
                    <div class="item" id="${tag}-item-${index}">
                        <div class="item-header">
                            <div class="item-text">${escapeHtml(item.text)}</div>
                            <div class="item-actions">
                                ${isUrlItem ? `<button class="btn btn-view btn-small" onclick="openLink('${escapeHtml(url)}')">View</button>` : ''}
                                <button class="btn btn-danger btn-small" onclick="deleteItem('${tag}', ${index})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function extractUrl(text) {
            const urlMatch = text.match(/(https?:\/\/[^\s]+)/);
            return urlMatch ? urlMatch[0] : null;
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        async function deleteItem(tag, index) {
            if (!confirm('Are you sure you want to delete this item?')) {
                return;
            }

            const item = itemsData[tag][index];

            try {
                const response = await fetch(`${API_URL}/items/${tag}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        lines: [item.full_line]
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('Item deleted successfully', 'success');
                    loadItems(tag);
                } else {
                    showToast('Error deleting item: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Failed to delete item: ' + error.message, 'error');
            }
        }

        async function deleteAll(tag) {
            if (!confirm(`Are you sure you want to delete ALL @${tag} items?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/items/${tag}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        delete_all: true
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast(`All @${tag} items deleted successfully`, 'success');
                    loadItems(tag);
                } else {
                    showToast('Error deleting items: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Failed to delete items: ' + error.message, 'error');
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
