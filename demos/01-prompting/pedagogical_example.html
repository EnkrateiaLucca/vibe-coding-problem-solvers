<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four ways to say hello</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <!-- =========================================================
       LAYER 2 — CSS (the STYLE)
       Monochrome, lots of whitespace, thin lines — matching
       the reference card design.
       ========================================================= -->
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Montserrat", "Helvetica Neue", Arial, system-ui, sans-serif;
      color: #1a1a1a;
      /* subtle diagonal two-tone, like the reference backdrop */
      background: linear-gradient(108deg, #eef0f2 0%, #eef0f2 56%, #e4e7ea 56%, #e4e7ea 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
    }

    .wrap { width: 100%; max-width: 1060px; }

    /* Big bold heading treatment, echoing "CLEAN MINIMALIST" */
    .title {
      font-size: 48px;
      font-weight: 800;
      line-height: 0.96;
      letter-spacing: -1px;
      text-transform: uppercase;
      margin: 0;
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a9099;
      margin: 18px 0 0;
    }

    /* The row of cards. position:relative so the marker can be
       placed precisely on top of any card. */
    #cards {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
      margin-top: 44px;
    }

    .card {
      position: relative;
      background: #ffffff;
      min-height: 300px;
      padding: 26px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
      cursor: pointer;
      transition: transform 0.55s cubic-bezier(.22,.61,.36,1), box-shadow 0.55s ease;
    }
    .card.active {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
    }

    /* Thin-line circle monogram with diagonal slash + two letters */
    .mono {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 46px;
      height: 46px;
      border: 1.5px solid #1a1a1a;
      border-radius: 50%;
      overflow: hidden;
      transition: background 0.5s ease, border-color 0.5s ease;
    }
    .mono .slash {
      position: absolute;
      left: 50%;
      top: -10%;
      width: 1.5px;
      height: 120%;
      background: #1a1a1a;
      transform: translateX(-50%) rotate(45deg);
      transition: background 0.5s ease;
    }
    .mono .l1 { position: absolute; top: 7px;    left: 12px;  font-size: 13px; font-weight: 700; transition: color 0.5s ease; }
    .mono .l2 { position: absolute; bottom: 6px; right: 12px; font-size: 13px; font-weight: 700; transition: color 0.5s ease; }
    .card.active .mono            { background: #1a1a1a; border-color: #1a1a1a; }
    .card.active .mono .slash     { background: #ffffff; }
    .card.active .mono .l1,
    .card.active .mono .l2        { color: #ffffff; }

    /* The greeting word: muted gray by default, full black when active */
    .greeting {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.05;
      color: #b3b8bf;
      transition: color 0.5s ease;
    }
    .card.active .greeting { color: #141414; }

    .lang {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #9aa0a6;
      margin-top: 8px;
    }

    /* Short hairline divider that grows when the card is active */
    .divider {
      height: 2px;
      width: 24px;
      background: #1a1a1a;
      margin: 18px 0 12px;
      transition: width 0.55s cubic-bezier(.22,.61,.36,1);
    }
    .card.active .divider { width: 64px; }

    .say { font-size: 12px; font-weight: 400; color: #9aa0a6; }

    /* The traveling marker — a small echo of the monogram circle */
    #marker {
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 14px;
      border: 1.5px solid #1a1a1a;
      border-radius: 50%;
      background: #ffffff;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.85s cubic-bezier(.5,.05,.2,1);
    }
    #marker::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #1a1a1a;
    }

    @media (max-width: 780px) { #cards { grid-template-columns: repeat(2, 1fr); } .title { font-size: 38px; } }
    @media (max-width: 460px) { #cards { grid-template-columns: 1fr; } }

    /* Respect users who prefer less motion: no gliding, just instant state. */
    @media (prefers-reduced-motion: reduce) {
      .card, .greeting, .divider, .mono, .mono .slash, .mono .l1, .mono .l2, #marker {
        transition: none !important;
      }
    }
  </style>
</head>

<body>

  <!-- =========================================================
       LAYER 1 — HTML (the STRUCTURE)
       Almost empty on purpose: just the heading and an empty
       container. JavaScript builds the four cards inside #cards.
       ========================================================= -->
  <div class="wrap">
    <h1 class="title">Four ways<br />to say hello</h1>
    <p class="eyebrow">one greeting &nbsp;·&nbsp; four languages</p>

    <div id="cards"></div>
  </div>

  <!-- =========================================================
       LAYER 3 — JavaScript (the BEHAVIOUR)
       Two jobs: (1) build the greeting cards from a data list,
       and (2) animate a marker that travels between them.
       ========================================================= -->
  <script>
    // (1) The greetings live here as data, and JS turns them into cards.
    const greetings = [
      { l1: "E", l2: "N", word: "Hello",    lang: "English",    say: "/ heh-loh /" },
      { l1: "P", l2: "T", word: "Olá",      lang: "Portuguese", say: "/ oh-lah /" },
      { l1: "F", l2: "R", word: "Bonjour",  lang: "French",     say: "/ bohn-zhoor /" },
      { l1: "J", l2: "P", word: "こんにちは", lang: "Japanese",   say: "/ kon-ni-chi-wa /" }
    ];

    const stage = document.getElementById("cards");
    const cards = [];

    greetings.forEach(function (g, index) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="mono"><span class="slash"></span>' +
        '<span class="l1">' + g.l1 + '</span><span class="l2">' + g.l2 + '</span></div>' +
        '<div class="info">' +
          '<div class="greeting"></div>' +
          '<div class="lang"></div>' +
          '<div class="divider"></div>' +
          '<div class="say"></div>' +
        '</div>';

      // Use textContent for the words so they are treated as plain text.
      card.querySelector(".greeting").textContent = g.word;
      card.querySelector(".lang").textContent = g.lang;
      card.querySelector(".say").textContent = g.say;

      // Clicking a card jumps the marker there.
      card.addEventListener("click", function () { goTo(index); });

      stage.appendChild(card);
      cards.push(card);
    });

    // (2) The traveling marker.
    const marker = document.createElement("div");
    marker.id = "marker";
    stage.appendChild(marker);

    let current = 0;
    let timer;

    function activate(idx) {
      cards.forEach(function (c, n) { c.classList.toggle("active", n === idx); });
      const card = cards[idx];
      // Move the marker to sit on the top-center edge of the active card.
      const x = card.offsetLeft + card.offsetWidth / 2 - 7;
      const y = card.offsetTop - 7;
      marker.style.transform = "translate(" + x + "px, " + y + "px)";
      current = idx;
    }

    function goTo(idx) {
      activate(idx);
      restart(); // reset the cycle so it doesn't jump again immediately
    }

    function restart() {
      clearInterval(timer);
      timer = setInterval(function () {
        activate((current + 1) % greetings.length);
      }, 2200);
    }

    activate(0);
    restart();

    // Keep the marker aligned if the window (and layout) changes size.
    window.addEventListener("resize", function () { activate(current); });
  </script>

</body>
</html>
